<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONLY・FAMILY ESPORTS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#00ffcc;
overflow:hidden;
}

/* ========== LOADER ========== */
#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:22px;
letter-spacing:4px;
color:#00ffcc;
animation:fadeOut 1s ease 2.5s forwards;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* ========== LOGIN ========== */
#login{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.9);
z-index:9998;
animation:zoomIn 0.6s ease;
}

@keyframes zoomIn{
from{transform:scale(1.2);opacity:0;}
to{transform:scale(1);opacity:1;}
}

#login input{
padding:10px;
margin:10px;
background:#111;
border:1px solid #00ffcc;
color:#fff;
text-align:center;
}

#login button{
padding:10px 20px;
background:#00ffcc;
border:none;
cursor:pointer;
}

.hide-login{
opacity:0;
pointer-events:none;
transition:0.4s;
}

/* ========== BLUR BACKGROUND WHEN LOGIN ACTIVE ========== */
body.login-active .content,
body.login-active .sidebar,
body.login-active .bg{
filter:blur(6px) brightness(0.4);
}

/* ========== BACKGROUND CYBER ========== */
.bg{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#00ffcc22 2px,transparent 2px);
background-size:50px 50px;
animation:move 20s linear infinite;
z-index:-1;
}

@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(-50px,-50px);}
}

/* ========== SIDEBAR ========== */
.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#0a0a0a;
padding-top:20px;
border-right:1px solid #00ffcc33;
}

.sidebar button{
width:100%;
padding:12px;
background:transparent;
border:none;
color:#00ffcc;
cursor:pointer;
}

.sidebar button:hover{
background:#00ffcc;
color:#000;
}

/* ========== CONTENT ========== */
.content{
display:none;
padding:20px;
margin-left:200px;
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* ========== SECTIONS ========== */
.section{display:none;}
.section.active{display:block;}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-left:3px solid #00ffcc;
margin:10px 0;
}

/* ========== HACK TEXT ========== */
#hackText{
margin-left:200px;
white-space:pre;
padding:10px;
color:#00ffcc;
}
</style>
</head>

<body class="login-active">

<!-- LOADER -->
<div id="loader">LOADING SYSTEM...</div>

<!-- LOGIN -->
<div id="login">
<h2>ENTER CODE</h2>
<input id="code" type="password">
<button onclick="check()">ENTER</button>
<p id="msg"></p>
</div>

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- SIDEBAR -->
<div class="sidebar">
<button onclick="show('home')">HOME</button>
<button onclick="show('rules')">RULES</button>
<button onclick="show('roster')">ROSTER</button>
</div>

<!-- CONTENT -->
<div class="content">

<h1>ONLY FAMILY ESPORTS</h1>

<div id="home" class="section active">
<div class="card">
<h2>HOME</h2>
<p>🔥 Welcome to ONLY FAMILY ESPORTS</p>
</div>
</div>

<div id="rules" class="section">
<div class="card">
<h2>RULES</h2>
<p>Put your rules here...</p>
</div>
</div>

<div id="roster" class="section">
<div class="card">
<h2>ROSTER</h2>
<p>Put your roster here...</p>
</div>
</div>

</div>

<!-- HACK TEXT -->
<div id="hackText"></div>

<script>

/* loader */
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},2500);

/* section switch */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* hack animation */
let hackLines = [
"ACCESSING SYSTEM...",
"CONNECTING SERVER...",
"BYPASSING SECURITY...",
"SCANNING DATA...",
"ACCESS GRANTED ✔"
];

let line = 0;
let char = 0;

function typeHack(){
let box = document.getElementById("hackText");
if(!box || line >= hackLines.length) return;

let text = hackLines[line];

if(char < text.length){
box.innerHTML += text[char];
char++;
setTimeout(typeHack, 50);
}else{
box.innerHTML += "<br>";
line++;
char = 0;
setTimeout(typeHack, 300);
}
}

/* login check */
function check(){
let c=document.getElementById("code");
let msg=document.getElementById("msg");

if(c.value.trim()==="OnlyFamily"){

document.getElementById("login").classList.add("hide-login");

setTimeout(()=>{
document.getElementById("login").style.display="none";
document.querySelector(".content").style.display="block";
document.body.classList.remove("login-active");
typeHack();
},500);

}else{
msg.innerText="❌ Wrong Code";
}
}

</script>

</body>
</html>
